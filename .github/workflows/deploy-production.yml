name: Production CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: server/global.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Restore backend
        run: dotnet restore server/SmartRentalPlatform.slnx

      - name: Build backend
        run: dotnet build server/SmartRentalPlatform.slnx --configuration Release --no-restore

      - name: Test backend
        run: dotnet test server/SmartRentalPlatform.slnx --configuration Release --no-build --verbosity normal

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        env:
          VITE_API_BASE_URL: http://localhost
        run: npm run build

      - name: Test frontend
        working-directory: client
        run: npm run test:run

  build-images:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
      client_image: ${{ steps.images.outputs.client_image }}
      meter_ai_image: ${{ steps.images.outputs.meter_ai_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          if [ -z "${{ vars.PRODUCTION_SITE_URL }}" ]; then
            echo "Repository variable PRODUCTION_SITE_URL is required for the production client build."
            exit 1
          fi
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "api_image=${repo}/api:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "client_image=${repo}/client:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "meter_ai_image=${repo}/meter-ai:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile.api
          push: true
          tags: ${{ steps.images.outputs.api_image }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: client
          file: client/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.client_image }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.PRODUCTION_SITE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_VIETMAP_API_KEY=${{ vars.VITE_VIETMAP_API_KEY }}
            VITE_VIETMAP_TILE_STYLE_URL=${{ vars.VITE_VIETMAP_TILE_STYLE_URL }}
            VITE_LEAFLET_TILE_URL=${{ vars.VITE_LEAFLET_TILE_URL }}

      - name: Build and push meter-ai image
        uses: docker/build-push-action@v6
        with:
          context: server/meter-ai
          file: server/meter-ai/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.meter_ai_image }}

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Trust EC2 host
        run: ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "mkdir -p '${{ secrets.EC2_DEPLOY_PATH }}/deploy'"
          scp docker-compose.prod.yml "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}/docker-compose.prod.yml"
          scp deploy/Caddyfile "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}/deploy/Caddyfile"
          scp deploy/env.production.template "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}/env.production.template"

      - name: Pull, migrate, and restart
        env:
          API_IMAGE: ${{ needs.build-images.outputs.api_image }}
          CLIENT_IMAGE: ${{ needs.build-images.outputs.client_image }}
          METER_AI_IMAGE: ${{ needs.build-images.outputs.meter_ai_image }}
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << EOF
            set -euo pipefail
            cd "${{ secrets.EC2_DEPLOY_PATH }}"

            if [ ! -f .env.production ]; then
              cp env.production.template .env.production
              echo "Created .env.production from template. Fill real production values, then rerun this workflow."
              exit 1
            fi

            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi

            tmp_env=".env.production.next"
            cp .env.production "\$tmp_env"
            sed -i '/^API_IMAGE=/d;/^CLIENT_IMAGE=/d;/^METER_AI_IMAGE=/d' "\$tmp_env"
            {
              echo "API_IMAGE=${API_IMAGE}"
              echo "CLIENT_IMAGE=${CLIENT_IMAGE}"
              echo "METER_AI_IMAGE=${METER_AI_IMAGE}"
            } >> "\$tmp_env"
            mv "\$tmp_env" .env.production

            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d postgres meter-ai
            docker compose --env-file .env.production -f docker-compose.prod.yml run --rm api-migrate
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d
            docker compose --env-file .env.production -f docker-compose.prod.yml ps
          EOF

      - name: Smoke test
        run: curl -fsS "${{ vars.PRODUCTION_SITE_URL }}/api/health"
