services:
  postgres:
    image: postgres:16
    container_name: smart-rental_postgres
    restart: always
    environment:
      POSTGRES_DB: smart-rental_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - rental_pg_data:/var/lib/postgresql/data

volumes:
  rental_pg_data:
